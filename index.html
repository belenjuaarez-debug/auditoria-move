<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MOVE Audit · Sistema de Supervisión con IA</title>
    <!-- Tailwind CSS + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0b1120; }
        .card-glass {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
        }
        .radio-group label { transition: 0.1s ease; cursor: pointer; }
        .section-card { transition: background-color 0.25s ease, border-color 0.2s; }
        .btn-primary {
            background: linear-gradient(95deg, #1e3a8a, #2563eb);
            box-shadow: 0 8px 20px -6px rgba(37, 99, 235, 0.3);
        }
        .btn-primary:hover {
            background: linear-gradient(95deg, #1e40af, #3b82f6);
            transform: translateY(-1px);
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }
        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p class="text-white mt-4 text-lg">🔄 Generando reporte con IA Grok...</p>
        <p class="text-gray-300 text-sm mt-2">Esto puede tomar unos segundos</p>
    </div>

    <div class="max-w-5xl mx-auto">
        <!-- Encabezado -->
        <div class="mb-8 text-center md:text-left md:flex md:justify-between md:items-end border-b border-blue-900/50 pb-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent tracking-tight">
                    MOVE · Auditoría Técnica con IA
                </h1>
                <p class="text-gray-400 text-sm mt-1">Supervisor · Rigor metodológico · Reporte inteligente con Grok</p>
            </div>
            <div class="mt-2 md:mt-0">
                <span class="text-xs uppercase tracking-wider bg-blue-950/60 text-blue-300 px-3 py-1 rounded-full border border-blue-800/40">
                    <i class="fas fa-robot mr-1"></i> IA Integrada
                </span>
            </div>
        </div>

        <!-- Formulario principal -->
        <form id="auditForm" class="space-y-6">
            <!-- Fila identificacion -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 bg-slate-900/50 p-5 rounded-2xl border border-slate-700/60">
                <div>
                    <label class="block text-sm font-semibold text-blue-300 mb-1"><i class="fas fa-chalkboard-user mr-1"></i> Nombre del Entrenador</label>
                    <input type="text" id="entrenador" placeholder="Ej: Laura Méndez" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-blue-300 mb-1"><i class="fas fa-heartbeat mr-1"></i> Nombre del Socio</label>
                    <input type="text" id="socio" placeholder="Ej: Carlos Rivera" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div id="sectionsContainer"></div>

            <!-- Hallazgos Técnicos y Plan de Acción -->
            <div class="card-glass rounded-2xl p-6 border border-slate-700/70 shadow-xl">
                <h2 class="text-xl font-semibold text-white flex items-center gap-2 mb-4"><i class="fas fa-search text-blue-400"></i> Hallazgos técnicos</h2>
                <textarea id="hallazgos" rows="3" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-gray-200 placeholder:text-gray-500 focus:ring-2 focus:ring-blue-500" placeholder="Ej: Se detectó que el 40% de los socios nivel 'Principiante' tienen prescritos ejercicios de cadena abierta sin progresión previa..."></textarea>
                
                <h2 class="text-xl font-semibold text-white flex items-center gap-2 mt-6 mb-3"><i class="fas fa-list-check text-blue-400"></i> Plan de acción (3 puntos concretos)</h2>
                <div class="space-y-3">
                    <input type="text" id="plan1" placeholder="1. Estandarizar: Reajustar ejercicios nivel principiante..." class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white">
                    <input type="text" id="plan2" placeholder="2. Capacitar: Refuerzo sobre RPE como métrica de seguridad..." class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white">
                    <input type="text" id="plan3" placeholder="3. Actualizar: Reevaluaciones pendientes en perfiles..." class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white">
                </div>
            </div>

            <!-- Botones -->
            <div class="flex flex-col sm:flex-row gap-4 justify-end items-center mt-6">
                <button type="button" id="generateReportBtn" class="btn-primary w-full sm:w-auto px-8 py-3 rounded-xl font-bold text-white shadow-lg transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-robot text-lg"></i> Generar Reporte con IA (Grok)
                </button>
                <button type="button" id="resetBtn" class="px-6 py-3 rounded-xl border border-slate-600 text-gray-300 hover:bg-slate-800 transition flex items-center gap-2">
                    <i class="fas fa-undo-alt"></i> Limpiar todo
                </button>
            </div>
        </form>

        <!-- Modal del reporte -->
        <div id="reportModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 hidden transition-all duration-300 p-4">
            <div class="bg-slate-900 rounded-2xl max-w-3xl w-full max-h-[85vh] overflow-y-auto border border-blue-500/30 shadow-2xl">
                <div class="sticky top-0 bg-slate-900/95 backdrop-blur-md border-b border-slate-700 px-6 py-4 flex justify-between items-center">
                    <h3 class="text-xl font-bold text-white"><i class="fas fa-brain text-blue-400 mr-2"></i>Informe IA · Auditoría MOVE con Grok</h3>
                    <button id="closeModalBtn" class="text-gray-400 hover:text-white text-2xl">&times;</button>
                </div>
                <div id="reportContent" class="p-6 text-gray-200 space-y-4 text-sm md:text-base whitespace-pre-wrap bg-slate-900/60">
                </div>
                <div class="flex flex-wrap gap-3 p-6 pt-0 border-t border-slate-800/60 justify-end">
                    <button id="copyReportBtn" class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-2 rounded-lg transition flex items-center gap-2"><i class="fas fa-copy"></i> Copiar texto</button>
                    <button id="downloadPdfBtn" class="bg-blue-700 hover:bg-blue-600 text-white px-5 py-2 rounded-lg transition flex items-center gap-2"><i class="fas fa-file-pdf"></i> Exportar PDF</button>
                    <button id="whatsappShareBtn" class="bg-green-700 hover:bg-green-600 text-white px-5 py-2 rounded-lg transition flex items-center gap-2"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                    <button id="emailShareBtn" class="bg-gray-700 hover:bg-gray-600 text-white px-5 py-2 rounded-lg transition flex items-center gap-2"><i class="fas fa-envelope"></i> Email</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURACIÓN API KEY DE GROK (xAI) ====================
        const API_KEY = "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";
        
        // ==================== DATOS DE SECCIONES ====================
        const sectionsData = [
            { title: "1. Gestión y Vigencia Operativa", icon: "fa-calendar-check", items: [
                { label: "Planificación al día", desc: "El plan actual cubre la fecha presente" },
                { label: "Tareas CRM", desc: "Tareas de seguimiento, llamados o mensajes completados" }
            ]},
            { title: "2. Evidencia de Diagnóstico y Evolución", icon: "fa-chart-line", items: [
                { label: "Evaluación Inicial", desc: "Cargada y con datos técnicos coherentes" },
                { label: "Reevaluación", desc: "Realizada en el ciclo correspondiente" }
            ]},
            { title: "3. Rigor Metodológico MOVE", icon: "fa-dumbbell", items: [
                { label: "Estructura de Sesión", desc: "Cumple orden: Warm-up, Core, Bloque Principal, Cool-down" },
                { label: "Control de Carga (RPE/RIR)", desc: "Prescrito en cada ejercicio o bloque" },
                { label: "Dosificación (Volumen/Intensidad)", desc: "Series y repeticiones acordes al objetivo" }
            ]},
            { title: "4. Customización y Nivelación", icon: "fa-user-check", items: [
                { label: "Nivel Biomecánico", desc: "Ejercicios acordes a la capacidad del socio" },
                { label: "Ajuste Personalizado", desc: "El plan muestra adaptaciones por lesiones o preferencias" }
            ]}
        ];

        let semaforos = { 0: "🟢 Verde", 1: "🟢 Verde", 2: "🟢 Verde", 3: "🟢 Verde" };

        function getBgColorClass(status) {
            if(status === "🟢 Verde") return "bg-gradient-to-r from-emerald-950/30 to-emerald-900/20 border-l-4 border-emerald-500";
            if(status === "🟡 Amarillo") return "bg-gradient-to-r from-yellow-950/30 to-amber-900/20 border-l-4 border-yellow-500";
            if(status === "🔴 Rojo") return "bg-gradient-to-r from-red-950/40 to-red-900/20 border-l-4 border-red-500";
            return "";
        }

        function renderSections() {
            const container = document.getElementById("sectionsContainer");
            container.innerHTML = "";
            sectionsData.forEach((sec, idx) => {
                const currentColor = semaforos[idx];
                const bgClass = getBgColorClass(currentColor);
                const sectionDiv = document.createElement("div");
                sectionDiv.className = `card-glass rounded-2xl p-5 border border-slate-700/50 shadow-md section-card transition-all duration-200 ${bgClass}`;
                
                let innerHtml = `
                    <div class="flex justify-between items-start flex-wrap gap-2 mb-4">
                        <h3 class="text-lg font-bold text-white flex items-center gap-2"><i class="fas ${sec.icon} text-blue-400"></i> ${sec.title}</h3>
                        <div class="radio-group flex gap-3 bg-slate-800/60 p-1.5 rounded-full px-3">
                `;
                const options = [
                    { value: "🟢 Verde", emoji: "🟢", label: "Verde" },
                    { value: "🟡 Amarillo", emoji: "🟡", label: "Amarillo" },
                    { value: "🔴 Rojo", emoji: "🔴", label: "Rojo" }
                ];
                options.forEach(opt => {
                    const checkedAttr = (semaforos[idx] === opt.value) ? 'checked' : '';
                    innerHtml += `
                        <label class="flex items-center gap-1 text-sm font-medium cursor-pointer px-2 py-1 rounded-full transition">
                            <input type="radio" name="semaforo_${idx}" value="${opt.value}" ${checkedAttr} class="w-3.5 h-3.5 accent-blue-500">
                            <span class="text-gray-200">${opt.emoji} ${opt.label}</span>
                        </label>
                    `;
                });
                innerHtml += `</div></div><div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">`;
                sec.items.forEach(item => {
                    innerHtml += `<div class="flex items-start gap-2 bg-black/20 p-2 rounded-lg">
                        <i class="fas fa-square-check text-blue-400/70 mt-0.5 text-sm"></i>
                        <span class="text-gray-300 text-sm"><span class="font-semibold text-white">${item.label}</span><br><span class="text-gray-400 text-xs">${item.desc}</span></span>
                    </div>`;
                });
                innerHtml += `</div><div class="mt-2">
                    <label class="block text-xs uppercase tracking-wide text-blue-300 font-semibold mb-1"><i class="fas fa-pen-alt mr-1"></i> Observaciones</label>
                    <textarea rows="2" id="obs_${idx}" placeholder="Registrar hallazgos específicos..." class="w-full bg-slate-800/70 border border-slate-600 rounded-xl p-2 text-sm text-white placeholder:text-gray-500"></textarea>
                </div>`;
                sectionDiv.innerHTML = innerHtml;
                container.appendChild(sectionDiv);
                
                const radios = sectionDiv.querySelectorAll(`input[name="semaforo_${idx}"]`);
                radios.forEach(radio => {
                    radio.addEventListener("change", (e) => {
                        if(e.target.checked) {
                            semaforos[idx] = e.target.value;
                            sectionDiv.className = `card-glass rounded-2xl p-5 border border-slate-700/50 shadow-md section-card transition-all duration-200 ${getBgColorClass(e.target.value)}`;
                        }
                    });
                });
            });
        }

        function collectFormData() {
            const entrenador = document.getElementById("entrenador").value.trim() || "No especificado";
            const socio = document.getElementById("socio").value.trim() || "No especificado";
            const hallazgos = document.getElementById("hallazgos").value.trim() || "Sin hallazgos técnicos registrados.";
            const plan1 = document.getElementById("plan1").value.trim() || "Pendiente definir";
            const plan2 = document.getElementById("plan2").value.trim() || "Pendiente definir";
            const plan3 = document.getElementById("plan3").value.trim() || "Pendiente definir";
            
            const seccionesDetalle = [];
            for(let i=0; i<sectionsData.length; i++) {
                const obsTextarea = document.getElementById(`obs_${i}`);
                const observaciones = obsTextarea ? obsTextarea.value.trim() : "Sin observaciones.";
                seccionesDetalle.push({
                    titulo: sectionsData[i].title,
                    semaforo: semaforos[i],
                    observaciones: observaciones
                });
            }
            return { entrenador, socio, hallazgos, plan1, plan2, plan3, seccionesDetalle };
        }

        function generateBaseReport() {
            const data = collectFormData();
            const fecha = new Date().toLocaleString('es-AR');
            let reporte = `📋 INFORME BASE AUDITORÍA MOVE\n`;
            reporte += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            reporte += `📅 Fecha: ${fecha}\n`;
            reporte += `👤 Entrenador: ${data.entrenador}\n`;
            reporte += `🏋️ Socio: ${data.socio}\n\n`;
            reporte += `🔹 SEMÁFOROS:\n`;
            data.seccionesDetalle.forEach(sec => {
                reporte += `   ${sec.titulo}: ${sec.semaforo}\n`;
            });
            reporte += `\n📝 OBSERVACIONES:\n`;
            data.seccionesDetalle.forEach(sec => {
                reporte += `   ${sec.titulo}: ${sec.observaciones}\n`;
            });
            reporte += `\n🔎 HALLAZGOS TÉCNICOS:\n${data.hallazgos}\n`;
            reporte += `\n📌 PLAN DE ACCIÓN:\n1. ${data.plan1}\n2. ${data.plan2}\n3. ${data.plan3}\n`;
            return reporte;
        }

        // Función para llamar a la API de Grok (xAI)
        async function mejorarConIA(reporteBase) {
            const response = await fetch("https://api.x.ai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "grok-beta",
                    messages: [
                        {
                            role: "system",
                            content: "Eres un auditor experto en metodología MOVE de entrenamiento funcional y gimnasios. Tu tarea es mejorar el siguiente reporte de auditoría con análisis profesional, recomendaciones específicas y un tono ejecutivo. Mantén la estructura pero agrega valor con insights técnicos."
                        },
                        {
                            role: "user",
                            content: `Mejora este reporte de auditoría con análisis profesional, recomendaciones accionables y manteniendo todos los datos:\n\n${reporteBase}`
                        }
                    ],
                    temperature: 0.7,
                    max_tokens: 2000
                })
            });
            
            if (!response.ok) {
                throw new Error(`Error API: ${response.status}`);
            }
            
            const data = await response.json();
            return data.choices[0].message.content;
        }

        function mostrarCargando() {
            document.getElementById("loadingOverlay").style.display = "flex";
        }
        
        function ocultarCargando() {
            document.getElementById("loadingOverlay").style.display = "none";
        }

        let currentReportText = "";
        
        function showReportModal(reportText) {
            currentReportText = reportText;
            const modal = document.getElementById("reportModal");
            const contentDiv = document.getElementById("reportContent");
            contentDiv.innerHTML = `<pre class="whitespace-pre-wrap font-mono text-sm text-gray-200 leading-relaxed">${escapeHtml(reportText)}</pre>`;
            modal.classList.remove("hidden");
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => alert("✅ Reporte copiado")).catch(() => alert("No se pudo copiar"));
        }
        
        async function downloadPDF(text) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const splitText = doc.splitTextToSize(text, 180);
            doc.text(splitText, 15, 20);
            doc.save(`auditoria_move_${Date.now()}.pdf`);
        }
        
        function shareWhatsApp(text) {
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }
        
        function shareEmail(text) {
            window.location.href = `mailto:?subject=Informe Auditoría MOVE&body=${encodeURIComponent(text)}`;
        }
        
        function resetFullForm() {
            document.getElementById("entrenador").value = "";
            document.getElementById("socio").value = "";
            document.getElementById("hallazgos").value = "";
            document.getElementById("plan1").value = "";
            document.getElementById("plan2").value = "";
            document.getElementById("plan3").value = "";
            for(let i=0; i<4; i++) semaforos[i] = "🟢 Verde";
            renderSections();
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderSections();
            
            document.getElementById("generateReportBtn").addEventListener("click", async () => {
                const reporteBase = generateBaseReport();
                mostrarCargando();
                
                try {
                    const reporteMejorado = await mejorarConIA(reporteBase);
                    showReportModal(reporteMejorado);
                } catch(error) {
                    console.error("Error con IA:", error);
                    showReportModal(reporteBase + "\n\n⚠️ NO SE PUDO CONECTAR CON IA DE GROK\nMotivo: " + error.message + "\n\nMostrando reporte base. Verifica tu conexión a internet y que la API key sea válida.");
                } finally {
                    ocultarCargando();
                }
            });
            
            document.getElementById("resetBtn").addEventListener("click", resetFullForm);
            document.getElementById("closeModalBtn").addEventListener("click", () => {
                document.getElementById("reportModal").classList.add("hidden");
            });
            document.getElementById("copyReportBtn").addEventListener("click", () => {
                if(currentReportText) copyToClipboard(currentReportText);
            });
            document.getElementById("downloadPdfBtn").addEventListener("click", () => {
                if(currentReportText) downloadPDF(currentReportText);
            });
            document.getElementById("whatsappShareBtn").addEventListener("click", () => {
                if(currentReportText) shareWhatsApp(currentReportText);
            });
            document.getElementById("emailShareBtn").addEventListener("click", () => {
                if(currentReportText) shareEmail(currentReportText);
            });
        });
    </script>
</body>
</html>
